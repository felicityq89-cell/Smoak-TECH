<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pingback-tracer</title>
<style>
  :root{ --bg:#070b08; --panel:#0d140e; --line:#1c2c1f; --ink:#d7ffe2; --dim:#6f9a7d; --acc:#5eff8f; }
  *{box-sizing:border-box;margin:0}
  body{font-family:ui-monospace,Consolas,monospace;background:var(--bg);color:var(--ink);padding:30px;max-width:820px;margin:auto}
  h1{font-size:19px;letter-spacing:.06em}h1 b{color:var(--acc)}
  p.sub{color:var(--dim);font-size:13px;margin:6px 0 20px}
  .bar{display:flex;gap:10px;margin-bottom:18px}
  input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:10px 12px;font:inherit}
  button{font:inherit;color:#06120a;background:var(--acc);border:0;border-radius:8px;padding:10px 18px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:400;text-transform:uppercase;font-size:11px;letter-spacing:.1em}
  td.ms{color:var(--acc)}
  footer{margin-top:22px;color:var(--dim);font-size:11px}
</style>
</head>
<body>
  <h1>pingback<b>-tracer</b></h1>
  <p class="sub">traceroute visualiser — resolves the path packets take to a host.</p>
  <div class="bar">
    <input id="host" value="gateway.palmertech.net" />
    <button id="go">trace</button>
  </div>
  <table>
    <thead><tr><th>#</th><th>hop</th><th>address</th><th>latency</th></tr></thead>
    <tbody id="hops"></tbody>
  </table>
  <footer>pingback-tracer · v0.8.2 · for authorised diagnostics only</footer>
<script>
  const hopsEl=document.getElementById('hops');
  const path=[
    ["core-rtr-01","10.0.0.1"],["sc-edge-04","10.4.18.2"],["isp-gw","88.221.5.17"],
    ["ix-london","195.66.224.9"],["backbone-ams","80.249.208.1"],["dst-lb","104.21.9.42"]
  ];
  function trace(){
    hopsEl.innerHTML=''; let n=0;
    const id=setInterval(()=>{
      if(n>=path.length){clearInterval(id);return;}
      const [name,ip]=path[n]; const ms=(8+Math.random()*60).toFixed(1);
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${n+1}</td><td>${name}</td><td>${ip}</td><td class="ms">${ms} ms</td>`;
      hopsEl.appendChild(tr); n++;
    },320);
  }
  document.getElementById('go').onclick=trace; trace();
</script>
</body>
</html>
